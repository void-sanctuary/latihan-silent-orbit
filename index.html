<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemi Planet Hopper - HTML Canvas Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117; /* GitHub Dark Color */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Supaya tidak bisa scroll */
        }
        #gameCanvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none; /* UI tidak menghalangi klik */
        }
        #score-display {
            font-size: 32px;
            font-weight: bold;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            opacity: 0.8;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="score-display">Skor: 0</div>
    </div>
    
    <div id="instructions">Ketuk Layar atau tekan SPASI untuk melompat</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // -- Logika Game JavaScript di sini --
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');

        // Set ukuran canvas full screen
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // State Game
        let score = 0;
        let gameState = 'START'; // START, PLAYING, GAME_OVER

        // Variabel Planet dan Pesawat
        let player = { x: 0, y: 0, radius: 10, color: '#ff79c6' };
        let planets = [];
        const planetCount = 4;
        let targetPlanetIndex = 1;

        // Inisialisasi Planet
        function initPlanets() {
            planets = [];
            for (let i = 0; i < planetCount; i++) {
                planets.push({
                    x: canvas.width / 2,
                    y: canvas.height * (0.8 - (i * 0.2)),
                    radius: 30 + Math.random() * 20,
                    rotationAngle: Math.random() * Math.PI * 2,
                    rotationSpeed: 0.02 + (Math.random() * 0.03),
                    orbitRadius: 60 + Math.random() * 40,
                    color: `hsl(${220 + i * 20}, 70%, 60%)` // Warna HSL untuk gradasi luar angkasa
                });
            }
            // Letakkan player di planet pertama
            player.x = planets[0].x;
            player.y = planets[0].y;
        }
        initPlanets();

        // Game Loop
        function loop() {
            // Bersihkan Canvas
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'PLAYING') {
                update();
                draw();
            } else if (gameState === 'START') {
                ctx.fillStyle = 'white';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Planet Hopper', canvas.width/2, canvas.height/2);
            } else if (gameState === 'GAME_OVER') {
                ctx.fillStyle = 'white';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Game Over', canvas.width/2, canvas.height/2);
                ctx.fillText(`Skor Akhir: ${score}`, canvas.width/2, canvas.height/2 + 50);
            }

            requestAnimationFrame(loop);
        }

        // Update Logika
        function update() {
            planets.forEach((planet, index) => {
                planet.rotationAngle += planet.rotationSpeed;
            });
        }

        // Gambar Visual
        function draw() {
            // Gambar Planet
            planets.forEach(planet => {
                // Gambar Orbit
                ctx.beginPath();
                ctx.arc(planet.x, planet.y, planet.radius + planet.orbitRadius, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Gambar Planet
                ctx.beginPath();
                ctx.arc(planet.x, planet.y, planet.radius, 0, Math.PI * 2);
                ctx.fillStyle = planet.color;
                ctx.fill();
            });

            // Gambar Pesawat
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
        }

        // Input Handling
        function onJump() {
            if (gameState === 'START' || gameState === 'GAME_OVER') {
                gameState = 'PLAYING';
                score = 0;
                scoreDisplay.innerText = 'Skor: 0';
                initPlanets();
                return;
            }

            // Logika lompat ke targetPlanetIndex
            let targetPlanet = planets[targetPlanetIndex];
            
            // SEDERHANA: Langsung lompat ke orbit target
            // Idealnya ini pakai animasi interpolasi linier (Lerp)
            player.x = targetPlanet.x;
            player.y = targetPlanet.y;
            
            // Geser target ke planet berikutnya
            targetPlanetIndex = (targetPlanetIndex + 1) % planetCount;
            score++;
            scoreDisplay.innerText = `Skor: ${score}`;
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') onJump(); });
        window.addEventListener('touchstart', onJump);

        // Mulai Game Loop
        loop();
    </script>
</body>
</html>
