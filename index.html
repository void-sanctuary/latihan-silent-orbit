<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Orbit - Space Hopper Pro</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameCanvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 30px;
            left: 30px;
            pointer-events: none;
        }
        #score-display {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        #instructions {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0.6;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            text-align: center;
            width: 90%;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="score-display">Skor: 0</div>
    </div>
    
    <div id="instructions">Tunggu momen yang pas, lalu ketuk untuk meluncur ke atas!</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- WEB AUDIO API ---
        let audioCtx = null;
        let bgmInterval = null;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startBGM();
        }

        function playSound(freq, type, duration, endFreq) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            if(endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function startBGM() {
            const notes = [110, 130.81, 146.83, 164.81, 196.00];
            let step = 0;
            bgmInterval = setInterval(() => {
                if (gameState !== 'PLAYING' && gameState !== 'START') return;
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                let currentNote = notes[Math.floor(Math.random() * notes.length)];
                if (step % 4 === 0) currentNote = notes[0]; 
                osc.frequency.setValueAtTime(currentNote, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
                step++;
            }, 380);
        }

        // --- LOGIKA GAME ---
        let score = 0;
        let gameState = 'START';
        let gameOverTimer = 0; // Untuk jeda waktu setelah kalah

        let stars = [];
        for(let i=0; i<50; i++) {
            stars.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, size: Math.random() * 2, alpha: Math.random() });
        }

        let particles = [];
        function createExplosion(x, y, color) {
            for(let i=0; i<25; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    radius: 2 + Math.random() * 4,
                    color: color || '#ff5555',
                    alpha: 1,
                    decay: 0.03
                });
            }
        }

        let player = { 
            x: 0, y: 0, 
            vx: 0, vy: 0,
            angle: 0,
            radius: 12, color: '#ff79c6',
            isMoving: false, speed: 14 
        };
        
        let planets = [];
        let currentPlanetIndex = 0;

        function generateRandomPlanet(yPosition) {
            const radius = 18 + Math.random() * 22;
            const rotSpeed = (0.015 + Math.random() * 0.02) * (25 / radius) * (Math.random() > 0.5 ? 1 : -1); 
            return {
                x: canvas.width / 2 + (Math.random() * 100 - 50), 
                y: yPosition,
                radius: radius,
                angle: Math.random() * Math.PI * 2,
                rotSpeed: rotSpeed,
                orbitDist: radius + 30 + Math.random() * 15,
                color: `hsl(${Math.random() * 360}, 85%, 60%)`,
                isDead: false
            };
        }

        function initPlanets() {
            planets = [];
            let startY = canvas.height * 0.75;
            let spacing = canvas.height * 0.23;

            for (let i = 0; i < 5; i++) {
                planets.push(generateRandomPlanet(startY - (i * spacing)));
            }
            
            currentPlanetIndex = 0;
            attachPlayerToPlanet();
            particles = [];
        }

        function attachPlayerToPlanet() {
            let p = planets[currentPlanetIndex];
            // Posisi roket mengunci di koordinat orbit planet saat ini
            player.x = p.x + Math.cos(p.angle) * p.orbitDist;
            player.y = p.y + Math.sin(p.angle) * p.orbitDist;
            player.isMoving = false;
            player.vx = 0;
            player.vy = 0;
        }

        function loop() {
            ctx.fillStyle = '#0b0e14';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Bintang berkelap-kelip
            stars.forEach(star => {
                star.alpha += (Math.random() - 0.5) * 0.05;
                if(star.alpha < 0) star.alpha = 0; if(star.alpha > 1) star.alpha = 1;
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });

            // Update & Gambar Partikel Ledakan / Ekor
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                if(p.vx) { p.x += p.vx; p.y += p.vy; } // Jika partikel ledakan
                p.alpha -= p.decay;
                if (p.alpha <= 0) { particles.splice(i, 1); } else {
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha; ctx.fill(); ctx.globalAlpha = 1;
                }
            }

            if (gameState === 'PLAYING' || gameState === 'START') {
                update();
                draw();
            } else if (gameState === 'GAME_OVER') {
                gameOverTimer++;
                // Efek dramatis planet tetap berputar di belakang layar buram
                draw();
                
                // Overlay Hitam Transparan pudar
                ctx.fillStyle = `rgba(11, 14, 20, ${Math.min(0.8, gameOverTimer * 0.05)})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Teks Game Over muncul pelan
                if(gameOverTimer > 15) {
                    ctx.fillStyle = '#ff5555';
                    ctx.font = 'bold 36px Arial'; ctx.textAlign = 'center';
                    ctx.fillText('MISSION FAILED', canvas.width/2, canvas.height/2 - 30);
                    
                    ctx.font = '20px Arial'; ctx.fillStyle = '#8be9fd';
                    ctx.fillText(`Skor Akhir: ${score}`, canvas.width/2, canvas.height/2 + 15);
                    
                    ctx.font = '14px Arial'; ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.fillText('Ketuk Layar untuk Mengulang', canvas.width/2, canvas.height/2 + 70);
                }
            }

            requestAnimationFrame(loop);
        }

        function update() {
            planets.forEach(p => { if(!p.isDead) p.angle += p.rotSpeed; });

            if (!player.isMoving) {
                let p = planets[currentPlanetIndex];
                player.x = p.x + Math.cos(p.angle) * p.orbitDist;
                player.y = p.y + Math.sin(p.angle) * p.orbitDist;
                // Sudut roket menghadap keluar dari pusat planet saat berputar
                player.angle = Math.atan2(player.y - p.y, player.x - p.x);
            } else {
                // Efek ekor asap roket
                particles.push({ x: player.x, y: player.y, radius: 3, color: 'rgba(255,121,198,0.5)', alpha: 1, decay: 0.08 });

                // Roket meluncur lurus sesuai arah kecepatan (Vector velocity)
                player.x += player.vx;
                player.y += player.vy;

                // Deteksi apakah roket mendekati planet target berikutnya
                let nextPlanet = planets[currentPlanetIndex + 1];
                if (nextPlanet) {
                    let distToTargetCenter = Math.hypot(nextPlanet.x - player.x, nextPlanet.y - player.y);
                    
                    // Toleransi mendarat: jika masuk ke area ring orbitnya
                    if (Math.abs(distToTargetCenter - nextPlanet.orbitDist) < 15) {
                        currentPlanetIndex++;
                        score++;
                        scoreDisplay.innerText = `Skor: ${score}`;
                        playSound(300, 'triangle', 0.1, 600); // Suara sukses mendarat
                        shiftPlanetsDown();
                        player.isMoving = false;
                        return;
                    }
                }

                // KONDISI GAME OVER 1: Terbang kebablasan keluar batas layar
                if (player.y < -50 || player.x < -50 || player.x > canvas.width + 50 || player.y > canvas.height + 50) {
                    triggerGameOver();
                }
            }

            // KONDISI GAME OVER 2: Telat melompat sampai planet terseret ke bawah layar
            if(planets[currentPlanetIndex].y > canvas.height + 80) {
                triggerGameOver();
            }
        }

        function triggerGameOver() {
            if(gameState === 'GAME_OVER') return;
            gameState = 'GAME_OVER';
            gameOverTimer = 0;
            playSound(150, 'sawtooth', 0.4, 40); // Suara ledakan kalah
            
            // Ledakkan planet target terdekat sebagai efek visual hancur
            let targetPlanet = planets[currentPlanetIndex + 1];
            if(targetPlanet) {
                targetPlanet.isDead = true;
                createExplosion(targetPlanet.x, targetPlanet.y, targetPlanet.color);
            }
        }

        function shiftPlanetsDown() {
            let spacing = canvas.height * 0.23;
            planets.forEach(p => p.y += spacing);
            planets.shift();
            currentPlanetIndex--; // Tetap kunci di indeks yang sama karena array bergeser
            planets.push(generateRandomPlanet(planets[planets.length - 1].y - spacing));
        }

        // FUNGSI MENGGAMBAR BENTUK ROKET (Bukan Bulat Polos)
        function drawRocket(x, y, angle, size, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle + Math.PI / 2); // Sesuaikan rotasi moncong roket menghadap depan

            ctx.beginPath();
            // Desain segitiga bodi roket tajam
            ctx.moveTo(0, -size); 
            ctx.lineTo(-size/2, size);
            ctx.lineTo(size/2, size);
            ctx.closePath();
            
            ctx.fillStyle = color;
            ctx.shadowBlur = 15; ctx.shadowColor = color;
            ctx.fill();
            ctx.restore();
            ctx.shadowBlur = 0;
        }

        function draw() {
            planets.forEach((p, idx) => {
                if(p.isDead) return; // Jangan gambar jika sudah meledak

                // Ring Orbit
                ctx.beginPath(); ctx.arc(p.x, p.y, p.orbitDist, 0, Math.PI * 2);
                ctx.strokeStyle = idx === currentPlanetIndex + 1 ? 'rgba(255, 255, 255, 0.3)' : 'rgba(255, 255, 255, 0.06)';
                ctx.lineWidth = idx === currentPlanetIndex + 1 ? 2 : 1;
                ctx.stroke();

                // Inti Planet
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color; ctx.shadowBlur = 20; ctx.shadowColor = p.color; ctx.fill(); ctx.shadowBlur = 0; 
            });

            // Gambar Player sebagai ROKET jika masih hidup
            if (gameState === 'PLAYING' || gameState === 'START') {
                drawRocket(player.x, player.y, player.angle, 12, player.color);
            }
        }

        function action() {
            initAudio();

            // Selesai Game Over, butuh nunggu timer kelar baru bisa tap untuk main lagi (Anti panik-klik)
            if (gameState === 'GAME_OVER') {
                if(gameOverTimer > 25) {
                    score = 0; scoreDisplay.innerText = 'Skor: 0';
                    initPlanets();
                    gameState = 'PLAYING';
                }
                return;
            }

            if (gameState === 'START') {
                gameState = 'PLAYING';
                return;
            }

            if (!player.isMoving && gameState === 'PLAYING') {
                // Hitung arah lurus berdasarkan sudut rotasi saat dilepas
                player.vx = Math.cos(player.angle) * player.speed;
                player.vy = Math.sin(player.angle) * player.speed;
                player.isMoving = true;
                
                playSound(200, 'triangle', 0.15, 500); // Suara roket meluncur
            }
        }

        window.addEventListener('touchstart', (e) => { e.preventDefault(); action(); }, {passive: false});
        window.addEventListener('mousedown', (e) => { if(e.button === 0) action(); });
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') action(); });

        initPlanets();
        loop();
    </script>
</body>
</html>
