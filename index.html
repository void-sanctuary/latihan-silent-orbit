<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Orbit - Space Hopper</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameCanvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 30px;
            left: 30px;
            pointer-events: none;
        }
        #score-display {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        #instructions {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0.6;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="score-display">Skor: 0</div>
    </div>
    
    <div id="instructions">Ketuk layar untuk melompat & memulai musik</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- WEB AUDIO API (Sintesis Musik & Suara Tanpa File) ---
        let audioCtx = null;
        let bgmInterval = null;

        function initAudio() {
            if (audioCtx) return; // Cegah duplikasi
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startBGM();
        }

        // Efek Suara Lompat (SFX)
        function playJumpSound() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            // Suara naik meluncur ke atas (pitch bend)
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
            
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        // Musik Latar Otomatis (BGM Retro Space)
        function startBGM() {
            const notes = [110, 130.81, 146.83, 164.81, 196.00]; // Nada Pentatonik Minor (Santai)
            let step = 0;

            bgmInterval = setInterval(() => {
                if (gameState !== 'PLAYING' && gameState !== 'START') return;
                
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                osc.type = 'sine';
                // Membuat melodi acak yang harmonis
                let currentNote = notes[Math.floor(Math.random() * notes.length)];
                if (step % 4 === 0) currentNote = notes[0]; // Bassline penentu tempo
                
                osc.frequency.setValueAtTime(currentNote, audioCtx.currentTime);
                
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
                
                step++;
            }, 400); // Kecepatan tempo musik
        }

        // --- LOGIKA GAME & VISUAL ---
        let score = 0;
        let gameState = 'START';

        // Efek Bintang Latar Belakang
        let stars = [];
        for(let i=0; i<60; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 2,
                alpha: Math.random()
            });
        }

        // Player dengan sistem Animasi Pergerakan (Lerp)
        let player = { 
            x: 0, y: 0, 
            targetX: 0, targetY: 0,
            radius: 10, color: '#ff79c6',
            isMoving: false, speed: 0.15 
        };
        
        let planets = [];
        let currentPlanetIndex = 0;

        function initPlanets() {
            planets = [];
            let startY = canvas.height * 0.75;
            let spacing = canvas.height * 0.22;

            for (let i = 0; i < 5; i++) {
                planets.push({
                    x: canvas.width / 2 + (i % 2 === 0 ? 40 : -40), // Posisi agak zig-zag estetik
                    y: startY - (i * spacing),
                    radius: 25 + Math.random() * 15,
                    angle: Math.random() * Math.PI * 2,
                    rotSpeed: 0.015 + (Math.random() * 0.02),
                    orbitDist: 55 + Math.random() * 20,
                    color: `hsl(${200 + i * 25}, 75%, 65%)`
                });
            }
            
            currentPlanetIndex = 0;
            // Letakkan player langsung di posisi orbit planet pertama
            let p = planets[0];
            player.x = p.x + Math.cos(p.angle) * p.orbitDist;
            player.y = p.y + Math.sin(p.angle) * p.orbitDist;
            player.targetX = player.x;
            player.targetY = player.y;
            player.isMoving = false;
        }

        function loop() {
            // Background luar angkasa gelap
            ctx.fillStyle = '#0b0e14';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Gambar Bintang Kelap-kelip
            stars.forEach(star => {
                star.alpha += (Math.random() - 0.5) * 0.05;
                if(star.alpha < 0) star.alpha = 0;
                if(star.alpha > 1) star.alpha = 1;
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });

            if (gameState === 'PLAYING' || gameState === 'START') {
                update();
                draw();
            } else if (gameState === 'GAME_OVER') {
                ctx.fillStyle = 'white';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
                ctx.font = '18px Arial';
                ctx.fillStyle = '#8be9fd';
                ctx.fillText(`Skor Akhir: ${score}`, canvas.width/2, canvas.height/2 + 20);
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fillText('Ketuk untuk Main Lagi', canvas.width/2, canvas.height/2 + 60);
            }

            requestAnimationFrame(loop);
        }

        function update() {
            // Update rotasi orbit planet
            planets.forEach(p => p.angle += p.rotSpeed);

            let currentPlanet = planets[currentPlanetIndex];

            if (!player.isMoving) {
                // Player mengunci dan berputar mengikuti orbit planet saat ini
                player.x = currentPlanet.x + Math.cos(currentPlanet.angle) * currentPlanet.orbitDist;
                player.y = currentPlanet.y + Math.sin(currentPlanet.angle) * currentPlanet.orbitDist;
            } else {
                // Animasi meluncur halus (Linear Interpolation) menuju planet target
                player.x += (player.targetX - player.x) * player.speed;
                player.y += (player.targetY - player.y) * player.speed;

                // Jika sudah sangat dekat dengan target, kunci posisinya
                let dist = Math.hypot(player.targetX - player.x, player.targetY - player.y);
                if (dist < 5) {
                    player.isMoving = false;
                    score++;
                    scoreDisplay.innerText = `Skor: ${score}`;
                    
                    // Geser layar ke bawah secara otomatis agar planet baru turun
                    shiftPlanetsDown();
                }
            }

            // Batasan Game Over: Jika planet target keluar dari layar bawah sebelum dilompati
            if(planets[currentPlanetIndex].y > canvas.height + 100) {
                gameState = 'GAME_OVER';
            }
        }

        function shiftPlanetsDown() {
            let spacing = canvas.height * 0.22;
            // Geser semua planet ke bawah
            planets.forEach(p => p.y += spacing);
            
            // Hapus planet terbawah yang keluar layar, ganti dengan planet baru di atas
            planets.shift();
            planets.push({
                x: canvas.width / 2 + (Math.random() * 100 - 50),
                y: planets[planets.length - 1].y - spacing,
                radius: 25 + Math.random() * 15,
                angle: Math.random() * Math.PI * 2,
                rotSpeed: 0.015 + (Math.random() * 0.02),
                orbitDist: 55 + Math.random() * 20,
                color: `hsl(${200 + Math.random() * 100}, 75%, 65%)`
            });
        }

        function draw() {
            // Gambar Garis Orbit dan Planet
            planets.forEach((p, idx) => {
                // Lingkaran Orbit samar
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.orbitDist, 0, Math.PI * 2);
                ctx.strokeStyle = idx === currentPlanetIndex + 1 ? 'rgba(139, 233, 253, 0.3)' : 'rgba(255, 255, 255, 0.08)';
                ctx.lineWidth = idx === currentPlanetIndex + 1 ? 2 : 1;
                ctx.stroke();

                // Inti Planet
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.color;
                ctx.fill();
                ctx.shadowBlur = 0; // reset efek glow
            });

            // Gambar Player (Pesawat/Satelit kecil)
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = player.color;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function action() {
            // Aktifkan Audio di ketukan pertama (Peraturan Browser HP)
            initAudio();

            if (gameState === 'START' || gameState === 'GAME_OVER') {
                score = 0;
                scoreDisplay.innerText = 'Skor: 0';
                initPlanets();
                gameState = 'PLAYING';
                return;
            }

            if (!player.isMoving && gameState === 'PLAYING') {
                // Hitung posisi mendarat tepat di orbit planet berikutnya
                let nextPlanet = planets[currentPlanetIndex + 1];
                
                player.targetX = nextPlanet.x + Math.cos(nextPlanet.angle) * nextPlanet.orbitDist;
                player.targetY = nextPlanet.y + Math.sin(nextPlanet.angle) * nextPlanet.orbitDist;
                player.isMoving = true;
                
                playJumpSound();
            }
        }

        window.addEventListener('touchstart', (e) => { e.preventDefault(); action(); }, {passive: false});
        window.addEventListener('mousedown', (e) => { if(e.button === 0) action(); });
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') action(); });

        initPlanets();
        loop();
    </script>
</body>
</html>
