<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Orbit - Space Hopper</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameCanvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 30px;
            left: 30px;
            pointer-events: none;
        }
        #score-display {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        #instructions {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0.6;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="score-display">Skor: 0</div>
    </div>
    
    <div id="instructions">Ketuk layar untuk melompat</div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- WEB AUDIO API ---
        let audioCtx = null;
        let bgmInterval = null;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startBGM();
        }

        function playJumpSound() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        function startBGM() {
            const notes = [110, 130.81, 146.83, 164.81, 196.00, 220, 261.63];
            let step = 0;
            bgmInterval = setInterval(() => {
                if (gameState !== 'PLAYING' && gameState !== 'START') return;
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                let currentNote = notes[Math.floor(Math.random() * notes.length)];
                if (step % 4 === 0) currentNote = notes[1]; 
                osc.frequency.setValueAtTime(currentNote, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.35);
                step++;
            }, 350);
        }

        // --- LOGIKA GAME & VISUAL ---
        let score = 0;
        let gameState = 'START';

        // Efek Bintang Latar Belakang
        let stars = [];
        for(let i=0; i<60; i++) {
            stars.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 2,
                alpha: Math.random()
            });
        }

        // Efek Partikel Ekor Pesawat (Trail)
        let particles = [];
        function createTrail(x, y) {
            particles.push({
                x: x, y: y,
                radius: 4 + Math.random() * 3,
                color: '#ff79c6',
                alpha: 1,
                decay: 0.05
            });
        }

        // Player dengan sistem Animasi Pergerakan (Lerp)
        let player = { 
            x: 0, y: 0, 
            targetX: 0, targetY: 0,
            radius: 9, color: '#ff79c6',
            isMoving: false, speed: 0.18 
        };
        
        let planets = [];
        let currentPlanetIndex = 0;

        // Fungsi pembuat planet acak yang bervariasi jenisnya
        function generateRandomPlanet(yPosition) {
            const radius = 15 + Math.random() * 25; // Ukuran variatif (kecil banget - besar)
            // Kecepatan putar menyesuaikan ukuran (planet besar lebih lambat, kecil lebih ngebut)
            const rotSpeed = (0.01 + Math.random() * 0.02) * (25 / radius) * (Math.random() > 0.5 ? 1 : -1); 
            return {
                x: canvas.width / 2 + (Math.random() * 120 - 60), 
                y: yPosition,
                radius: radius,
                angle: Math.random() * Math.PI * 2,
                rotSpeed: rotSpeed,
                orbitDist: radius + 25 + Math.random() * 25, // Jarak orbit proporsional dengan ukuran planet
                color: `hsl(${Math.random() * 360}, 80%, 60%)` // Spektrum warna penuh (Warna-warni!)
            };
        }

        function initPlanets() {
            planets = [];
            let startY = canvas.height * 0.75;
            let spacing = canvas.height * 0.22;

            for (let i = 0; i < 5; i++) {
                planets.push(generateRandomPlanet(startY - (i * spacing)));
            }
            
            currentPlanetIndex = 0;
            let p = planets[0];
            player.x = p.x + Math.cos(p.angle) * p.orbitDist;
            player.y = p.y + Math.sin(p.angle) * p.orbitDist;
            player.targetX = player.x;
            player.targetY = player.y;
            player.isMoving = false;
            particles = [];
        }

        function loop() {
            ctx.fillStyle = '#0b0e14';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Gambar Bintang
            stars.forEach(star => {
                star.alpha += (Math.random() - 0.5) * 0.05;
                if(star.alpha < 0) star.alpha = 0;
                if(star.alpha > 1) star.alpha = 1;
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            });

            // Gambar & Update Partikel Ekor
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.alpha -= p.decay;
                p.radius -= 0.1;
                if (p.alpha <= 0 || p.radius <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 121, 198, ${p.alpha})`;
                    ctx.fill();
                }
            }

            if (gameState === 'PLAYING' || gameState === 'START') {
                update();
                draw();
            } else if (gameState === 'GAME_OVER') {
                ctx.fillStyle = 'white';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
                ctx.font = '18px Arial';
                ctx.fillStyle = '#8be9fd';
                ctx.fillText(`Skor Akhir: ${score}`, canvas.width/2, canvas.height/2 + 20);
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fillText('Ketuk untuk Main Lagi', canvas.width/2, canvas.height/2 + 60);
            }

            requestAnimationFrame(loop);
        }

        function update() {
            planets.forEach(p => p.angle += p.rotSpeed);

            let currentPlanet = planets[currentPlanetIndex];

            if (!player.isMoving) {
                player.x = currentPlanet.x + Math.cos(currentPlanet.angle) * currentPlanet.orbitDist;
                player.y = currentPlanet.y + Math.sin(currentPlanet.angle) * currentPlanet.orbitDist;
            } else {
                // Buat efek ekor saat bergerak
                createTrail(player.x, player.y);

                player.x += (player.targetX - player.x) * player.speed;
                player.y += (player.targetY - player.y) * player.speed;

                let dist = Math.hypot(player.targetX - player.x, player.targetY - player.y);
                if (dist < 5) {
                    player.isMoving = false;
                    score++;
                    scoreDisplay.innerText = `Skor: ${score}`;
                    shiftPlanetsDown();
                }
            }

            if(planets[currentPlanetIndex].y > canvas.height + 100) {
                gameState = 'GAME_OVER';
            }
        }

        function shiftPlanetsDown() {
            let spacing = canvas.height * 0.22;
            planets.forEach(p => p.y += spacing);
            planets.shift();
            // Bikin planet baru di paling atas dengan visual yang fresh dan random
            planets.push(generateRandomPlanet(planets[planets.length - 1].y - spacing));
        }

        function draw() {
            planets.forEach((p, idx) => {
                // Garis Orbit
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.orbitDist, 0, Math.PI * 2);
                ctx.strokeStyle = idx === currentPlanetIndex + 1 ? 'rgba(255, 255, 255, 0.25)' : 'rgba(255, 255, 255, 0.06)';
                ctx.lineWidth = idx === currentPlanetIndex + 1 ? 2 : 1;
                ctx.stroke();

                // Inti Planet dengan efek Glow Neon
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = p.color;
                ctx.fill();
                ctx.shadowBlur = 0; 
            });

            // Gambar Player
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 12;
            ctx.shadowColor = player.color;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function action() {
            initAudio();

            if (gameState === 'START' || gameState === 'GAME_OVER') {
                score = 0;
                scoreDisplay.innerText = 'Skor: 0';
                initPlanets();
                gameState = 'PLAYING';
                return;
            }

            if (!player.isMoving && gameState === 'PLAYING') {
                let nextPlanet = planets[currentPlanetIndex + 1];
                player.targetX = nextPlanet.x + Math.cos(nextPlanet.angle) * nextPlanet.orbitDist;
                player.targetY = nextPlanet.y + Math.sin(nextPlanet.angle) * nextPlanet.orbitDist;
                player.isMoving = true;
                playJumpSound();
            }
        }

        window.addEventListener('touchstart', (e) => { e.preventDefault(); action(); }, {passive: false});
        window.addEventListener('mousedown', (e) => { if(e.button === 0) action(); });
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') action(); });

        initPlanets();
        loop();
    </script>
</body>
</html>
