<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Orbit v2</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
}

canvas{
display:block;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
z-index:10;
background:rgba(0,0,0,0.4);
padding:8px;
border-radius:10px;
}

#joystick{
position:fixed;
bottom:40px;
left:30px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(255,255,255,0.15);
touch-action:none;
}

#stick{
position:absolute;
left:35px;
top:35px;
width:50px;
height:50px;
border-radius:50%;
background:white;
}

#actions{
position:fixed;
bottom:40px;
right:30px;
display:flex;
flex-direction:column;
gap:10px;
}

button{
width:70px;
height:70px;
border:none;
border-radius:50%;
font-size:20px;
}
</style>
</head>
<body>

<div id="ui">
<div>Character: <span id="char"></span></div>
<div>HP: <span id="hp"></span></div>
<div>Bond: <span id="bond"></span></div>
<div>EXP: <span id="exp"></span></div>
<div>Route: <span id="route"></span></div>
</div>

<canvas id="game"></canvas>

<div id="joystick">
<div id="stick"></div>
</div>

<div id="actions">
<button onclick="attack()">⚔</button>
<button onclick="skill()">✦</button>
<button onclick="switchChar()">⇄</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let naz = {
x:150,y:250,hp:100,bond:50,exp:0
};

let dokja = {
x:220,y:250,hp:100,bond:50,exp:0
};

let current = "Naz";

let enemy = {
x:500,y:250,hp:50
};

let route = "Normal";

function getPlayer(){
return current==="Naz" ? naz : dokja;
}

function switchChar(){
current = current==="Naz" ? "Dokja" : "Naz";
}

function attack(){
let p = getPlayer();
let dx = p.x - enemy.x;
let dy = p.y - enemy.y;
let dist = Math.sqrt(dx*dx + dy*dy);

if(dist < 70){
enemy.hp -= 10;
p.exp += 5;

if(current==="Dokja"){
p.bond += 8;
}

if(enemy.hp <= 0){
enemy.x = Math.random()*canvas.width;
enemy.y = Math.random()*(canvas.height-200);
enemy.hp = 50;
}
}
}

function skill(){
let p = getPlayer();

if(current==="Naz"){
enemy.hp -= 20;
}

if(current==="Dokja"){
p.bond += 15;
}
}

function enemyAI(){
let p = getPlayer();

let dx = p.x - enemy.x;
let dy = p.y - enemy.y;
let dist = Math.sqrt(dx*dx + dy*dy);

if(dist < 220){
enemy.x += dx * 0.02;
enemy.y += dy * 0.02;
}

if(dist < 40){
p.hp -= 0.5;
}
}

function updateRoute(){
if(dokja.bond >= 100){
route = "Yandere Route";
}
if(naz.exp >= 50){
route = "Rival Route";
}
}

function drawBackground(){
let sky = ctx.createLinearGradient(0,0,0,canvas.height);
sky.addColorStop(0,"#7ec8ff");
sky.addColorStop(1,"#d9f4ff");
ctx.fillStyle = sky;
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#8bc34a";
ctx.fillRect(0,canvas.height-180,canvas.width,180);

for(let i=0;i<6;i++){
ctx.fillStyle="#4caf50";
ctx.beginPath();
ctx.arc(100+i*180, canvas.height-220, 40, 0, Math.PI*2);
ctx.fill();

ctx.fillStyle="#6d4c41";
ctx.fillRect(90+i*180, canvas.height-180, 20, 40);
}

ctx.fillStyle="#9e9e9e";
ctx.beginPath();
ctx.moveTo(600,canvas.height-180);
ctx.lineTo(700,200);
ctx.lineTo(800,canvas.height-180);
ctx.fill();
}

function drawCharacter(x,y,type){
if(type==="Naz"){
ctx.fillStyle="#dcdcdc";
ctx.fillRect(x+8,y,24,24); // head

ctx.fillStyle="#4d6bff";
ctx.fillRect(x+10,y+24,20,30); // body

ctx.fillStyle="#2d3ea0";
ctx.fillRect(x+5,y+54,8,20);
ctx.fillRect(x+27,y+54,8,20);

ctx.fillStyle="#b0b0b0";
ctx.fillRect(x+2,y+10,8,8);
ctx.fillRect(x+30,y+10,8,8);
}

if(type==="Dokja"){
ctx.fillStyle="#ffe0c4";
ctx.fillRect(x+8,y,22,22);

ctx.fillStyle="#ff9b5e";
ctx.fillRect(x+10,y+22,18,26);

ctx.fillStyle="#cc7a45";
ctx.fillRect(x+7,y+48,7,18);
ctx.fillRect(x+25,y+48,7,18);

ctx.fillStyle="#ffcf9c";
ctx.fillRect(x+2,y+10,7,7);
ctx.fillRect(x+29,y+10,7,7);
}
}

function drawEnemy(){
ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(enemy.x,enemy.y,20,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";
ctx.fillRect(enemy.x-8,enemy.y-5,4,4);
ctx.fillRect(enemy.x+4,enemy.y-5,4,4);
}

function updateUI(){
let p = getPlayer();

document.getElementById("char").innerText = current;
document.getElementById("hp").innerText = Math.floor(p.hp);
document.getElementById("bond").innerText = p.bond;
document.getElementById("exp").innerText = p.exp;
document.getElementById("route").innerText = route;
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

drawBackground();
drawCharacter(naz.x,naz.y,"Naz");
drawCharacter(dokja.x,dokja.y,"Dokja");
drawEnemy();
updateUI();
}

let joystick = document.getElementById("joystick");
let stick = document.getElementById("stick");

let active = false;

joystick.addEventListener("touchstart", ()=> active=true);
joystick.addEventListener("touchend", ()=>{
active=false;
stick.style.left="35px";
stick.style.top="35px";
});

joystick.addEventListener("touchmove",(e)=>{
if(!active) return;

let touch = e.touches[0];
let rect = joystick.getBoundingClientRect();

let x = touch.clientX - rect.left - 25;
let y = touch.clientY - rect.top - 25;

stick.style.left = x+"px";
stick.style.top = y+"px";

let p = getPlayer();

if(x < 20) p.x -= 3;
if(x > 50) p.x += 3;
if(y < 20) p.y -= 3;
if(y > 50) p.y += 3;
});

setInterval(()=>{
enemyAI();
updateRoute();
draw();
},80);

draw();
</script>

</body>
</html>
