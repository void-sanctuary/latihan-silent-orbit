<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Orbit</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:monospace;
    overflow:hidden;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}

canvas{
    display:block;
    background:#15192d;
}

#controls{
    position:fixed;
    bottom:20px;
    width:100%;
    text-align:center;
}

button{
    width:70px;
    height:70px;
    margin:5px;
    font-size:22px;
    border:none;
    border-radius:10px;
}
</style>
</head>
<body>

<div id="ui">
    <div>HP: <span id="hp">100</span></div>
    <div>Bond: <span id="bond">50</span></div>
    <div>EXP: <span id="exp">0</span></div>
    <div>Route: <span id="route">Normal</span></div>
    <div>Character: <span id="char">Naz</span></div>
</div>

<canvas id="game"></canvas>

<div id="controls">
    <button onclick="move('up')">↑</button><br>

    <button onclick="move('left')">←</button>
    <button onclick="attack()">⚔</button>
    <button onclick="move('right')">→</button><br>

    <button onclick="move('down')">↓</button><br>

    <button onclick="switchChar()">SWITCH</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 200;

let player = {
    x:50,
    y:50,
    size:40,
    hp:100,
    bond:50,
    exp:0,
    char:"Naz"
};

let enemy = {
    x:250,
    y:200,
    size:40,
    hp:30
};

let route = "Normal";

function move(direction){
    if(direction==="up") player.y -= 20;
    if(direction==="down") player.y += 20;
    if(direction==="left") player.x -= 20;
    if(direction==="right") player.x += 20;

    boundaries();
    drawGame();
}

function boundaries(){
    if(player.x < 0) player.x = 0;
    if(player.y < 0) player.y = 0;
    if(player.x > canvas.width-player.size)
        player.x = canvas.width-player.size;
    if(player.y > canvas.height-player.size)
        player.y = canvas.height-player.size;
}

function attack(){
    let dx = player.x - enemy.x;
    let dy = player.y - enemy.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 80){
        enemy.hp -= 10;

        if(player.char==="Dokja"){
            player.bond += 5;
        }

        if(enemy.hp <= 0){
            player.exp += 10;

            enemy.x = Math.random() * (canvas.width-50);
            enemy.y = Math.random() * (canvas.height-50);
            enemy.hp = 30;
        }
    }

    updateRoute();
    updateUI();
    drawGame();
}

function switchChar(){
    if(player.char==="Naz"){
        player.char="Dokja";
    } else {
        player.char="Naz";
    }

    updateUI();
    drawGame();
}

function enemyAttack(){
    let dx = player.x - enemy.x;
    let dy = player.y - enemy.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < 50){
        player.hp -= 0.2;
    }
}

function updateRoute(){
    if(player.bond >= 100){
        route = "Yandere Route";
    }

    if(player.exp >= 50){
        route = "Rival Route";
    }
}

function updateUI(){
    document.getElementById("hp").innerText = Math.floor(player.hp);
    document.getElementById("bond").innerText = player.bond;
    document.getElementById("exp").innerText = player.exp;
    document.getElementById("route").innerText = route;
    document.getElementById("char").innerText = player.char;
}

function drawGame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(player.char==="Naz"){
        ctx.fillStyle = "#5c6cff";
    } else {
        ctx.fillStyle = "#ffae57";
    }

    ctx.fillRect(player.x, player.y, player.size, player.size);

    ctx.fillStyle = "red";
    ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
}

function gameLoop(){
    enemyAttack();
    updateUI();
    drawGame();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
